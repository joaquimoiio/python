<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyFundamentos — Plataforma de Estudo Python</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  --bg-primary: #1e1e2e;
  --bg-secondary: #181825;
  --bg-surface: #252538;
  --bg-surface-hover: #2a2a3d;
  --bg-elevated: #303046;
  --bg-code: #11111b;
  --border-color: #313145;
  --border-active: #585880;
  --text-primary: #cdd6f4;
  --text-secondary: #a6adc8;
  --text-muted: #6c7086;
  --text-heading: #f0f0f8;
  --accent-primary: #89b4fa;
  --accent-secondary: #74c7ec;
  --accent-success: #a6e3a1;
  --accent-warning: #f9e2af;
  --accent-error: #f38ba8;

  /* 4 cores de syntax highlight */
  --hl-keyword: #cba6f7;
  --hl-string: #a6e3a1;
  --hl-number: #fab387;
  --hl-comment: #6c7086;
  --hl-builtin: #89dceb;
  --hl-constant: #fab387;

  --sidebar-width: 280px;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
}

/* ============================================================
   RESET
   ============================================================ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; font-size:16px; -webkit-font-smoothing:antialiased; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}
a { color: var(--accent-primary); text-decoration:none; }
::selection { background: rgba(137,180,250,0.25); color: var(--text-heading); }
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-active); }

/* ============================================================
   SIDEBAR
   ============================================================ */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  height: 100vh;
  position: sticky;
  top: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  z-index: 100;
  transition: transform var(--transition-normal);
}
.sidebar-header {
  display:flex; align-items:center; justify-content:space-between;
  padding: 12px 20px; border-bottom:1px solid var(--border-color); min-height:56px;
}
.logo { display:flex; align-items:center; gap:8px; }
.logo-icon {
  font-family: var(--font-mono); font-size:1.1rem; font-weight:700;
  color: var(--accent-primary); background: rgba(137,180,250,0.1);
  padding:2px 8px; border-radius: var(--radius-sm);
}
.logo-text { font-weight:700; font-size:0.95rem; color: var(--text-heading); }
.sidebar-close {
  display:none; background:none; border:none; color: var(--text-muted);
  font-size:1.5rem; cursor:pointer; padding:2px 6px; border-radius: var(--radius-sm);
}
.sidebar-close:hover { color: var(--text-primary); background: var(--bg-surface); }
.sidebar-search { padding:8px 16px; border-bottom:1px solid var(--border-color); }
.sidebar-search input {
  width:100%; padding:8px 14px; background: var(--bg-surface);
  border:1px solid var(--border-color); border-radius: var(--radius-md);
  color: var(--text-primary); font-family: var(--font-sans); font-size:0.82rem; outline:none;
  transition: border-color var(--transition-fast);
}
.sidebar-search input::placeholder { color: var(--text-muted); }
.sidebar-search input:focus { border-color: var(--accent-primary); }
.sidebar-nav { flex:1; overflow-y:auto; padding:4px 0; }
.nav-section { padding:4px 0; }
.nav-section-label {
  display:block; padding:4px 20px; font-size:0.68rem; font-weight:600;
  text-transform:uppercase; letter-spacing:0.8px; color: var(--text-muted); margin-top:8px;
}
.nav-item {
  display:flex; align-items:center; gap:8px; padding:7px 20px;
  font-size:0.84rem; color: var(--text-secondary); cursor:pointer;
  transition: all var(--transition-fast); border-left:3px solid transparent; user-select:none;
}
.nav-item:hover { background: var(--bg-surface-hover); color: var(--text-primary); }
.nav-item.active {
  color: var(--accent-primary); background: rgba(137,180,250,0.06);
  border-left-color: var(--accent-primary);
}
.nav-item-icon {
  font-family: var(--font-mono); font-size:0.7rem; width:22px; height:22px;
  display:flex; align-items:center; justify-content:center;
  border-radius: var(--radius-sm); background: var(--bg-surface);
  color: var(--text-muted); flex-shrink:0; font-weight:600;
}
.nav-item.active .nav-item-icon {
  background: rgba(137,180,250,0.15); color: var(--accent-primary);
}
.nav-item-text { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nav-item.hidden { display:none; }
.sidebar-footer {
  padding:14px 20px; border-top:1px solid var(--border-color);
  display:flex; align-items:center; gap:8px; font-size:0.72rem; color: var(--text-muted);
}
.sidebar-footer .separator { opacity:0.4; }
.sidebar-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6);
  z-index:99; opacity:0; transition: opacity var(--transition-normal);
}
.sidebar-overlay.visible { display:block; opacity:1; }

/* ============================================================
   MAIN
   ============================================================ */
.main { flex:1; display:flex; flex-direction:column; min-height:100vh; overflow-y:auto; }
.topbar {
  display:flex; align-items:center; padding:8px 24px; min-height:48px;
  border-bottom:1px solid var(--border-color); background: var(--bg-secondary);
  position:sticky; top:0; z-index:50; gap:16px;
}
.menu-toggle { display:none; flex-direction:column; gap:4px; background:none; border:none; cursor:pointer; padding:4px; }
.menu-toggle span { display:block; width:20px; height:2px; background: var(--text-secondary); border-radius:1px; }
.breadcrumb { display:flex; align-items:center; gap:8px; font-size:0.82rem; color: var(--text-muted); flex:1; }
.breadcrumb-current { color: var(--text-primary); font-weight:500; }
.breadcrumb-sep { opacity:0.4; }
.btn-scroll-top {
  padding:4px 12px; font-size:0.75rem; font-family: var(--font-sans);
  background: var(--bg-surface); border:1px solid var(--border-color);
  color: var(--text-secondary); border-radius: var(--radius-sm); cursor:pointer;
  transition: all var(--transition-fast);
}
.btn-scroll-top:hover { background: var(--bg-surface-hover); color: var(--text-primary); }

/* ============================================================
   CONTENT
   ============================================================ */
.content-area { flex:1; max-width:900px; width:100%; margin:0 auto; padding:32px 24px; }
.welcome-screen { display:none; text-align:center; padding:48px 0; animation: fadeInUp 0.5s ease; }
.welcome-screen.active { display:block; }
.welcome-inner { max-width:600px; margin:0 auto; }
.welcome-badge {
  display:inline-block; font-family: var(--font-mono); font-size:0.78rem; font-weight:600;
  color: var(--accent-primary); background: rgba(137,180,250,0.1);
  border:1px solid rgba(137,180,250,0.2); padding:4px 14px; border-radius:20px; margin-bottom:24px;
}
.welcome-screen h1 { font-size:2.2rem; font-weight:700; color: var(--text-heading); line-height:1.2; margin-bottom:16px; }
.welcome-desc { font-size:1rem; color: var(--text-secondary); line-height:1.7; margin-bottom:32px; }
.welcome-stats { display:flex; justify-content:center; gap:24px; margin-bottom:32px; }
.stat-card {
  background: var(--bg-surface); border:1px solid var(--border-color);
  border-radius: var(--radius-md); padding:16px 24px; display:flex; flex-direction:column;
  gap:2px; min-width:100px; transition: all var(--transition-fast);
}
.stat-card:hover { border-color: var(--border-active); transform:translateY(-2px); box-shadow: var(--shadow-sm); }
.stat-number { font-family: var(--font-mono); font-size:1.4rem; font-weight:700; color: var(--accent-primary); }
.stat-label { font-size:0.75rem; color: var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
.btn-primary {
  display:inline-flex; align-items:center; gap:8px; padding:10px 28px;
  font-family: var(--font-sans); font-size:0.88rem; font-weight:600;
  color: var(--bg-primary); background: var(--accent-primary); border:none;
  border-radius: var(--radius-md); cursor:pointer; transition: all var(--transition-fast);
}
.btn-primary:hover { background: var(--accent-secondary); transform:translateY(-1px); box-shadow: var(--shadow-md); }

/* Topic View */
.topic-view { display:none; animation: fadeInUp 0.4s ease; }
.topic-view.active { display:block; }
.topic-header { margin-bottom:24px; padding-bottom:24px; border-bottom:1px solid var(--border-color); }
.topic-title { font-size:1.6rem; font-weight:700; color: var(--text-heading); margin-bottom:8px; }
.topic-desc { font-size:0.92rem; color: var(--text-secondary); line-height:1.6; }
.topic-tabs { display:flex; gap:2px; margin-bottom:24px; border-bottom:1px solid var(--border-color); overflow-x:auto; }
.tab-btn {
  padding:8px 16px; font-family: var(--font-sans); font-size:0.82rem; font-weight:500;
  color: var(--text-muted); background:none; border:none;
  border-bottom:2px solid transparent; cursor:pointer; white-space:nowrap;
  transition: all var(--transition-fast);
}
.tab-btn:hover { color: var(--text-primary); }
.tab-btn.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); }
.topic-content { min-height:300px; }
.tab-panel { display:none; animation: fadeIn 0.3s ease; }
.tab-panel.active { display:block; }

/* Content Typography */
.content-block { margin-bottom:32px; }
.content-block h2 {
  font-size:1.15rem; font-weight:600; color: var(--text-heading);
  margin-bottom:16px; padding-left:16px; border-left:3px solid var(--accent-primary);
}
.content-block h3 { font-size:0.98rem; font-weight:600; color: var(--text-heading); margin-bottom:8px; margin-top:24px; }
.content-block p { font-size:0.9rem; color: var(--text-secondary); line-height:1.7; margin-bottom:16px; }
.content-block ul, .content-block ol { font-size:0.9rem; color: var(--text-secondary); line-height:1.7; margin-bottom:16px; padding-left:24px; }
.content-block li { margin-bottom:4px; }
.content-block strong { color: var(--text-primary); font-weight:600; }
.inline-code {
  font-family: var(--font-mono); font-size:0.82em; background: var(--bg-code);
  color: var(--accent-warning); padding:2px 7px; border-radius: var(--radius-sm);
  border:1px solid var(--border-color);
}
.info-box {
  background: rgba(137,180,250,0.06); border:1px solid rgba(137,180,250,0.2);
  border-left:3px solid var(--accent-primary); border-radius: var(--radius-md);
  padding:16px; margin-bottom:24px; font-size:0.86rem; color: var(--text-secondary); line-height:1.6;
}
.info-box strong { color: var(--accent-primary); }
.warning-box {
  background: rgba(249,226,175,0.06); border:1px solid rgba(249,226,175,0.2);
  border-left:3px solid var(--accent-warning); border-radius: var(--radius-md);
  padding:16px; margin-bottom:24px; font-size:0.86rem; color: var(--text-secondary); line-height:1.6;
}
.warning-box strong { color: var(--accent-warning); }
.content-table { width:100%; border-collapse:collapse; margin-bottom:24px; font-size:0.85rem; }
.content-table th, .content-table td { padding:8px 16px; text-align:left; border:1px solid var(--border-color); }
.content-table th { background: var(--bg-surface); color: var(--text-heading); font-weight:600; font-size:0.8rem; text-transform:uppercase; }
.content-table td { color: var(--text-secondary); }
.content-table code { font-family: var(--font-mono); font-size:0.82em; color: var(--accent-warning); }
.content-table tr:hover td { background: var(--bg-surface-hover); }

/* ============================================================
   CODE BLOCK (IDE style)
   ============================================================ */
.code-block {
  background: var(--bg-code); border:1px solid var(--border-color);
  border-radius: var(--radius-md); margin-bottom:24px; overflow:hidden;
  transition: border-color var(--transition-fast);
}
.code-block:hover { border-color: var(--border-active); }
.code-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 16px; background: var(--bg-surface); border-bottom:1px solid var(--border-color);
}
.code-header-left { display:flex; align-items:center; gap:8px; }
.code-dots { display:flex; gap:5px; }
.code-dot { width:10px; height:10px; border-radius:50%; }
.code-dot.red { background:#ed8796; }
.code-dot.yellow { background:#eed49f; }
.code-dot.green { background:#a6da95; }
.code-filename { font-family: var(--font-mono); font-size:0.72rem; color: var(--text-muted); }
.code-copy-btn {
  font-family: var(--font-sans); font-size:0.72rem; padding:3px 10px;
  background: var(--bg-elevated); border:1px solid var(--border-color);
  color: var(--text-muted); border-radius: var(--radius-sm); cursor:pointer;
  transition: all var(--transition-fast);
}
.code-copy-btn:hover { background: var(--bg-surface-hover); color: var(--text-primary); border-color: var(--border-active); }
.code-copy-btn.copied { background: rgba(166,227,161,0.15); color: var(--accent-success); border-color: rgba(166,227,161,0.3); }
.code-body { display:flex; overflow-x:auto; padding:16px 0; }
.code-lines {
  display:flex; flex-direction:column; padding:0 14px; text-align:right;
  user-select:none; border-right:1px solid var(--border-color); min-width:40px;
}
.code-line-number { font-family: var(--font-mono); font-size:0.78rem; line-height:1.65; color: var(--text-muted); opacity:0.5; }
.code-content { flex:1; padding:0 16px; }
.code-content pre { font-family: var(--font-mono); font-size:0.82rem; line-height:1.65; white-space:pre; color: var(--text-primary); }

/* Syntax — apenas 4 cores simples */
.hl-keyword  { color: var(--hl-keyword); }
.hl-string   { color: var(--hl-string); }
.hl-number   { color: var(--hl-number); }
.hl-comment  { color: var(--hl-comment); font-style:italic; }
.hl-builtin  { color: var(--hl-builtin); }
.hl-constant { color: var(--hl-constant); }

/* Output */
.output-block {
  background: var(--bg-code); border:1px solid var(--border-color);
  border-radius: var(--radius-md); margin-bottom:24px; overflow:hidden;
}
.output-header {
  display:flex; align-items:center; padding:8px 16px;
  background: rgba(166,227,161,0.06); border-bottom:1px solid var(--border-color);
  font-family: var(--font-mono); font-size:0.72rem; color: var(--accent-success);
}
.output-body { padding:16px; }
.output-body pre { font-family: var(--font-mono); font-size:0.82rem; line-height:1.6; color: var(--text-secondary); }

/* ============================================================
   BOTTOM NAV
   ============================================================ */
.topic-nav-bottom {
  display:flex; justify-content:space-between; padding-top:32px;
  margin-top:32px; border-top:1px solid var(--border-color);
}
.btn-nav-prev, .btn-nav-next {
  padding:8px 20px; font-family: var(--font-sans); font-size:0.84rem; font-weight:500;
  border:1px solid var(--border-color); border-radius: var(--radius-md); cursor:pointer;
  transition: all var(--transition-fast); background: var(--bg-surface); color: var(--text-secondary);
}
.btn-nav-prev:hover:not(:disabled), .btn-nav-next:hover:not(:disabled) {
  background: var(--bg-surface-hover); color: var(--text-primary); border-color: var(--border-active); transform:translateY(-1px);
}
.btn-nav-prev:disabled, .btn-nav-next:disabled { opacity:0.3; cursor:not-allowed; }

/* ============================================================
   TOAST
   ============================================================ */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(80px);
  background: var(--bg-elevated); color: var(--accent-success);
  border:1px solid rgba(166,227,161,0.3); padding:8px 20px;
  border-radius: var(--radius-md); font-size:0.82rem; font-weight:500;
  opacity:0; pointer-events:none; transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index:200; box-shadow: var(--shadow-lg);
}
.toast.visible { opacity:1; transform:translateX(-50%) translateY(0); }

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media(max-width:900px) {
  .sidebar { position:fixed; left:0; top:0; transform:translateX(-100%); box-shadow: var(--shadow-lg); }
  .sidebar.open { transform:translateX(0); }
  .sidebar-close { display:block; }
  .menu-toggle { display:flex; }
  .content-area { padding:24px 14px; }
  .welcome-screen h1 { font-size:1.6rem; }
  .welcome-stats { flex-direction:column; align-items:center; }
  .stat-card { width:100%; max-width:220px; }
  .topic-title { font-size:1.3rem; }
}
@media(max-width:480px) {
  .content-area { padding:16px 8px; }
  .topbar { padding:8px 14px; }
  .content-table { font-size:0.75rem; }
  .content-table th, .content-table td { padding:4px 8px; }
}
</style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">&gt;_</span>
        <span class="logo-text">PyFundamentos</span>
      </div>
      <button class="sidebar-close" id="sidebar-close" aria-label="Fechar menu">&times;</button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="Buscar topico..." autocomplete="off" />
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <span class="version">v1.0.0</span>
      <span class="separator">|</span>
      <span class="tech">HTML / CSS / JS</span>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main -->
  <main class="main" id="main">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
        <span></span><span></span><span></span>
      </button>
      <div class="breadcrumb">
        <span class="breadcrumb-root">PyFundamentos</span>
        <span class="breadcrumb-sep">/</span>
        <span class="breadcrumb-current" id="breadcrumb-current">Inicio</span>
      </div>
      <div class="topbar-actions">
        <button class="btn-scroll-top" id="btn-scroll-top" title="Voltar ao topo">Topo</button>
      </div>
    </header>

    <div class="content-area" id="content-area">
      <!-- Welcome -->
      <section class="welcome-screen active" id="welcome-screen">
        <div class="welcome-inner">
          <div class="welcome-badge">&gt;_ Python Fundamentals</div>
          <h1>Domine os fundamentos de Python</h1>
          <p class="welcome-desc">Plataforma interativa para aprender os conceitos essenciais da linguagem Python. Navegue pelos topicos no menu lateral.</p>
          <div class="welcome-stats">
            <div class="stat-card"><span class="stat-number">13</span><span class="stat-label">Topicos</span></div>
            <div class="stat-card"><span class="stat-number">50+</span><span class="stat-label">Exemplos</span></div>
            <div class="stat-card"><span class="stat-number">100%</span><span class="stat-label">Pratico</span></div>
          </div>

        </div>
      </section>

      <!-- Topic -->
      <section class="topic-view" id="topic-view">
        <div class="topic-header">
          <h1 class="topic-title" id="topic-title"></h1>
          <p class="topic-desc" id="topic-desc"></p>
        </div>
        <div class="topic-tabs" id="topic-tabs"></div>

          <button class="btn-nav-prev" id="btn-prev" disabled>Anterior</button>
          <button class="btn-nav-next" id="btn-next">Proximo</button>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast">Codigo copiado!</div>

<script>
(function () {
  "use strict";

  /* ==========================================================
     ESCAPE HTML
     ========================================================== */
  function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  /* ==========================================================
     TOKENIZER — transforma uma linha de codigo em tokens
     Cada token = { type, value }
     Tipos: keyword, builtin, constant, string, number, comment, plain
     ========================================================== */
  var KW = ["import","from","as","def","class","return","yield","if","elif","else",
    "for","while","break","continue","pass","try","except","finally","raise","with",
    "and","or","not","in","is","lambda","global","nonlocal","del","assert","match","case"];
  var BI = ["print","input","len","range","type","isinstance","int","float","str","bool",
    "list","dict","set","tuple","map","filter","zip","enumerate","sorted","reversed",
    "abs","round","min","max","sum","open","super","chr","ord","hex","format","id",
    "hasattr","getattr","any","all"];
  var CO = ["True","False","None"];

  function tokenize(line) {
    var t = [], i = 0, n = line.length;
    while (i < n) {
      // comment #
      if (line[i] === "#") { t.push({type:"comment",value:line.substring(i)}); break; }
      // comment //
      if (line[i] === "/" && i+1 < n && line[i+1] === "/") { t.push({type:"comment",value:line.substring(i)}); break; }
      // triple quotes
      if (i+2 < n && (line.substring(i,i+3)==='"""' || line.substring(i,i+3)==="'''")) {
        var q = line.substring(i,i+3), pf = "";
        if (t.length && t[t.length-1].type==="plain" && /^[frb]$/.test(t[t.length-1].value)) pf = t.pop().value;
        var e = line.indexOf(q, i+3);
        if (e !== -1) { t.push({type:"string",value:pf+line.substring(i,e+3)}); i=e+3; }
        else { t.push({type:"string",value:pf+line.substring(i)}); break; }
        continue;
      }
      // string
      if (line[i]==='"' || line[i]==="'") {
        var ch=line[i], pf2="";
        if (t.length && t[t.length-1].type==="plain" && /^[frb]$/.test(t[t.length-1].value)) pf2=t.pop().value;
        var j=i+1;
        while(j<n){ if(line[j]==="\\"){j+=2;continue;} if(line[j]===ch){j++;break;} j++; }
        t.push({type:"string",value:pf2+line.substring(i,j)}); i=j; continue;
      }
      // number
      if (/[0-9]/.test(line[i]) || (line[i]==="." && i+1<n && /[0-9]/.test(line[i+1]))) {
        var s=i;
        if (line[i]==="0" && i+1<n && /[xXbBoO]/.test(line[i+1])) { i+=2; while(i<n && /[0-9a-fA-F_]/.test(line[i]))i++; }
        else { while(i<n && /[0-9_]/.test(line[i]))i++; if(i<n&&line[i]==="."){i++;while(i<n&&/[0-9_]/.test(line[i]))i++;} if(i<n&&/[eE]/.test(line[i])){i++;if(i<n&&/[+-]/.test(line[i]))i++;while(i<n&&/[0-9]/.test(line[i]))i++;} }
        t.push({type:"number",value:line.substring(s,i)}); continue;
      }
      // word
      if (/[a-zA-Z_]/.test(line[i])) {
        var ws=i; while(i<n && /[a-zA-Z0-9_]/.test(line[i]))i++;
        var w=line.substring(ws,i);
        if (CO.indexOf(w)!==-1) t.push({type:"constant",value:w});
        else if (KW.indexOf(w)!==-1) t.push({type:"keyword",value:w});
        else if (BI.indexOf(w)!==-1) t.push({type:"builtin",value:w});
        else t.push({type:"plain",value:w});
        continue;
      }
      t.push({type:"plain",value:line[i]}); i++;
    }
    return t;
  }

  function highlightLine(line) {
    var tokens = tokenize(line), html = "";
    for (var k = 0; k < tokens.length; k++) {
      var v = esc(tokens[k].value);
      switch(tokens[k].type) {
        case "keyword":  html += '<span class="hl-keyword">'  + v + '</span>'; break;
        case "builtin":  html += '<span class="hl-builtin">'  + v + '</span>'; break;
        case "constant": html += '<span class="hl-constant">' + v + '</span>'; break;
        case "string":   html += '<span class="hl-string">'   + v + '</span>'; break;
        case "number":   html += '<span class="hl-number">'   + v + '</span>'; break;
        case "comment":  html += '<span class="hl-comment">'  + v + '</span>'; break;
        default:         html += v;
      }
    }
    return html;
  }

  function highlightCode(raw) {
    return raw.split("\n").map(highlightLine).join("\n");
  }

  /* ==========================================================
     CODE BLOCK / OUTPUT BLOCK BUILDERS
     ========================================================== */
  function trimLines(code) {
    var lines = code.split("\n");
    while (lines.length && lines[0].trim()==="") lines.shift();
    while (lines.length && lines[lines.length-1].trim()==="") lines.pop();
    return lines;
  }

  function codeBlock(filename, code) {
    var lines = trimLines(code);
    var nums = "", i;
    for (i = 0; i < lines.length; i++) nums += '<span class="code-line-number">' + (i+1) + '</span>\n';
    var hi = highlightCode(lines.join("\n"));
    var raw = encodeURIComponent(lines.join("\n"));
    return '<div class="code-block">'
      +'<div class="code-header"><div class="code-header-left">'
      +'<div class="code-dots"><span class="code-dot red"></span><span class="code-dot yellow"></span><span class="code-dot green"></span></div>'
      +'<span class="code-filename">'+filename+'</span></div>'
      +'<button class="code-copy-btn" data-code="'+raw+'">Copiar</button></div>'
      +'<div class="code-body"><div class="code-lines">'+nums+'</div>'
      +'<div class="code-content"><pre>'+hi+'</pre></div></div></div>';
  }

  function out(text) {
    var lines = trimLines(text);
    return '<div class="output-block"><div class="output-header">Saida</div>'
      +'<div class="output-body"><pre>'+esc(lines.join("\n"))+'</pre></div></div>';
  }

  /* ==========================================================
     DOM
     ========================================================== */
  var sidebar     = document.getElementById("sidebar");
  var sidebarNav  = document.getElementById("sidebar-nav");
  var overlay     = document.getElementById("sidebar-overlay");
  var closeBtn    = document.getElementById("sidebar-close");
  var menuBtn     = document.getElementById("menu-toggle");
  var searchIn    = document.getElementById("search-input");
  var bcCurrent   = document.getElementById("breadcrumb-current");
  var welcomeScr  = document.getElementById("welcome-screen");
  var topicView   = document.getElementById("topic-view");
  var tTitle      = document.getElementById("topic-title");
  var tDesc       = document.getElementById("topic-desc");
  var tTabs       = document.getElementById("topic-tabs");
  var tContent    = document.getElementById("topic-content");
  var btnStart    = document.getElementById("btn-start");
  var btnPrev     = document.getElementById("btn-prev");
  var btnNext     = document.getElementById("btn-next");
  var btnTop      = document.getElementById("btn-scroll-top");
  var toastEl     = document.getElementById("toast");
  var mainEl      = document.getElementById("main");
  var curIdx      = -1;

  /* ==========================================================
     BUILD NAV
     ========================================================== */
  function buildNav() {
    var sec = "", h = "";
    for (var i = 0; i < TOPICS.length; i++) {
      var t = TOPICS[i];
      if (t.section !== sec) { sec = t.section; h += '<div class="nav-section"><span class="nav-section-label">'+sec+'</span></div>'; }
      h += '<div class="nav-item" data-index="'+i+'" data-search="'+t.title.toLowerCase()+'">'
        +'<span class="nav-item-icon">'+t.icon+'</span><span class="nav-item-text">'+t.title+'</span></div>';
    }
    sidebarNav.innerHTML = h;
  }

  /* ==========================================================
     LOAD TOPIC
     ========================================================== */
  function loadTopic(idx) {
    if (idx < 0 || idx >= TOPICS.length) return;
    var t = TOPICS[idx]; curIdx = idx;
    welcomeScr.classList.remove("active");
    topicView.classList.remove("active");
    void topicView.offsetHeight;
    topicView.classList.add("active");
    tTitle.textContent = t.title;
    tDesc.textContent = t.desc;
    bcCurrent.textContent = t.title;
    var tabH = "", conH = "";
    for (var i = 0; i < t.tabs.length; i++) {
      tabH += '<button class="tab-btn'+(i===0?' active':'')+'" data-tab="'+i+'">'+t.tabs[i].label+'</button>';
      conH += '<div class="tab-panel'+(i===0?' active':'')+'" data-panel="'+i+'">'+t.tabs[i].content+'</div>';
    }
    tTabs.innerHTML = tabH;
    tContent.innerHTML = conH;
    document.querySelectorAll(".nav-item").forEach(function(el){ el.classList.toggle("active", parseInt(el.dataset.index)===idx); });
    btnPrev.disabled = idx===0;
    btnNext.disabled = idx===TOPICS.length-1;
    mainEl.scrollTo({top:0,behavior:"smooth"});
    closeSidebar();
    bindCopy();
  }

  /* ==========================================================
     TABS
     ========================================================== */
  tTabs.addEventListener("click", function(e) {
    var b = e.target.closest(".tab-btn"); if(!b)return;
    var ti = b.dataset.tab;
    tTabs.querySelectorAll(".tab-btn").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active");
    tContent.querySelectorAll(".tab-panel").forEach(function(x){x.classList.remove("active");});
    tContent.querySelector('[data-panel="'+ti+'"]').classList.add("active");
    bindCopy();
  });

  /* ==========================================================
     COPY
     ========================================================== */
  function bindCopy() {
    document.querySelectorAll(".code-copy-btn").forEach(function(btn){
      var nb = btn.cloneNode(true); btn.parentNode.replaceChild(nb, btn);
      nb.addEventListener("click", function(){
        var raw = decodeURIComponent(nb.dataset.code);
        navigator.clipboard.writeText(raw).then(function(){
          nb.textContent="Copiado!"; nb.classList.add("copied"); showToast("Codigo copiado!");
          setTimeout(function(){nb.textContent="Copiar";nb.classList.remove("copied");},2000);
        }).catch(function(){
          var ta=document.createElement("textarea");ta.value=raw;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
          nb.textContent="Copiado!";nb.classList.add("copied");showToast("Copiado!");
          setTimeout(function(){nb.textContent="Copiar";nb.classList.remove("copied");},2000);
        });
      });
    });
  }

  /* ==========================================================
     TOAST
     ========================================================== */
  var toastT;
  function showToast(msg){ toastEl.textContent=msg; toastEl.classList.add("visible"); clearTimeout(toastT); toastT=setTimeout(function(){toastEl.classList.remove("visible");},2500); }

  /* ==========================================================
     SIDEBAR MOBILE
     ========================================================== */
  function openSidebar(){ sidebar.classList.add("open"); overlay.classList.add("visible"); }
  function closeSidebar(){ sidebar.classList.remove("open"); overlay.classList.remove("visible"); }
  menuBtn.addEventListener("click", openSidebar);
  closeBtn.addEventListener("click", closeSidebar);
  overlay.addEventListener("click", closeSidebar);

  /* ==========================================================
     SEARCH
     ========================================================== */
  searchIn.addEventListener("input", function(e){
    var q = e.target.value.toLowerCase().trim();
    document.querySelectorAll(".nav-item").forEach(function(it){ it.classList.toggle("hidden", !it.dataset.search.includes(q)); });
  });

  /* ==========================================================
     NAV / BUTTONS
     ========================================================== */
  sidebarNav.addEventListener("click", function(e){ var it=e.target.closest(".nav-item"); if(it) loadTopic(parseInt(it.dataset.index)); });
  btnPrev.addEventListener("click", function(){ if(curIdx>0)loadTopic(curIdx-1); });
  btnNext.addEventListener("click", function(){ if(curIdx<TOPICS.length-1)loadTopic(curIdx+1); });
  btnStart.addEventListener("click", function(){ loadTopic(0); });
  btnTop.addEventListener("click", function(){ mainEl.scrollTo({top:0,behavior:"smooth"}); });

  /* ==========================================================
     KEYBOARD
     ========================================================== */
  document.addEventListener("keydown", function(e){
    if(document.activeElement===searchIn) return;
    if(e.key==="ArrowLeft"&&curIdx>0) loadTopic(curIdx-1);
    else if(e.key==="ArrowRight"&&curIdx<TOPICS.length-1) loadTopic(curIdx+1);
    else if(e.key==="/"||e.ctrlKey&&e.key==="k"){e.preventDefault();searchIn.focus();}
    else if(e.key==="Escape"){searchIn.blur();closeSidebar();}
  });

  /* ==========================================================
     INIT
     ========================================================== */
  buildNav();
  var hash = window.location.hash.slice(1);
  if(hash){ var fi=TOPICS.findIndex(function(t){return t.id===hash;}); if(fi!==-1) loadTopic(fi); }

})();
</script>

</body>
</html>
